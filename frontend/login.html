<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RF Outlet - Login Profissional</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: false, 
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center p-4">

    <!-- Card de Login Sofisticado -->
    <div class="bg-white p-10 rounded-3xl shadow-[0_20px_50px_rgba(0,0,0,0.1)] w-full max-w-md border border-gray-100 relative overflow-hidden">
        
        <!-- Efeito de Gradiente no Topo -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-indigo-600 via-purple-600 to-indigo-600"></div>

        <!-- Header / Logo -->
        <div class="flex flex-col items-center mb-10">
            <!-- Símbolo / Logo da RF Outlet -->
            <img src="img/logo.jpg" alt="Símbolo RF Outlet" class="w-32 h-auto mb-4 object-contain drop-shadow-lg rounded-xl">
            
            <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">RF <span class="text-indigo-600 italic">Outlet</span></h1>
            <p class="text-sm text-gray-400 mt-2 font-medium">Gestão Inteligente de Estoque e Vendas</p>
        </div>

        <!-- Formulário -->
        <form id="loginForm" class="space-y-6">
            <div id="errorMessage" class="hidden bg-red-50 text-red-600 text-xs p-4 rounded-xl border border-red-100 text-center animate-pulse">
                Acesso negado. Verifique suas credenciais.
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Usuário / Login</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    </span>
                    <input id="login" type="text" required class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-transparent rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 transition-all outline-none text-gray-900 font-semibold" placeholder="Seu ID de acesso">
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-gray-500 uppercase tracking-widest mb-2 ml-1">Senha de Segurança</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    </span>
                    <input id="senha" type="password" required class="w-full pl-12 pr-4 py-4 bg-gray-50 border border-transparent rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white focus:border-indigo-500 transition-all outline-none text-gray-900 font-semibold" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between px-1">
                <div class="flex items-center">
                    <input id="remember" type="checkbox" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded cursor-pointer">
                    <label for="remember" class="ml-2 block text-sm text-gray-500 cursor-pointer">Lembrar de mim</label>
                </div>
                <div>
                    <a href="#" onclick="alert('Funcionalidade de recuperação acionada. O administrador receberá um alerta.')" class="text-sm font-bold text-indigo-600 hover:text-indigo-500 transition-colors">Esqueceu a senha?</a>
                </div>
            </div>

            <div>
                <button type="submit" id="btnSubmit" class="w-full flex justify-center items-center py-4 px-4 bg-gray-900 hover:bg-black text-white rounded-2xl shadow-xl hover:shadow-2xl active:scale-[0.98] transition-all font-bold tracking-wide">
                    ACESSAR DASHBOARD
                </button>
            </div>
        </form>
        
        <div class="mt-10 pt-8 border-t border-gray-50 text-center">
            <p class="text-xs text-gray-400 font-bold uppercase tracking-widest">
                &copy; 2026 Integra Group <span class="mx-2 text-indigo-300">|</span> Operado por Nero AI
            </p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const login = document.getElementById('login').value;
            const senha = document.getElementById('senha').value;
            const errorMsg = document.getElementById('errorMessage');
            const btn = document.getElementById('btnSubmit');

            errorMsg.classList.add('hidden');
            btn.innerHTML = '<div class="h-5 w-5 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';

            try {
                const res = await fetch('https://rfoutlet.onrender.com/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ login, senha })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('rfUser', JSON.stringify(data.user));
                    window.location.href = 'index.html';
                } else {
                    errorMsg.classList.remove('hidden');
                    btn.innerHTML = 'ACESSAR DASHBOARD';
                }
            } catch (err) {
                errorMsg.innerText = "Servidor offline. Ligue o motor (Node.js).";
                errorMsg.classList.remove('hidden');
                btn.innerHTML = 'ACESSAR DASHBOARD';
            }
        });
    </script>
</body>
</html>
